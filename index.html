<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Human Machine — A Finding-Out Comic</title>
<style>
  :root{
    --paper:#ece2c8; --ink:#141210; --cream:#fbf7ea; --cap:#d9d2bd;
    --red:#c0392b; --blue:#3fa7d6; --teal:#2f6f86; --gold:#c99a3b;
    --bg:#111; --bg2:#1a2230; --panel:#182231; --line:#2c3a52; --mut:#9fb0c6; --accent:#5ec8d8;
    --support:#4fb0e0; --core:#5fbf6a; --push:#e8b04b;
    --sys-circ:#e8574c; --sys-resp:#4fb0e0; --sys-dig:#5fbf6a; --sys-nerv:#c07be0; --sys-musc:#e8973f;
    --fire:#ff6b35; --space:#6ea8ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#17150f; color:#f3ecd8; font-family:Georgia,"Times New Roman",serif;
    -webkit-font-smoothing:antialiased; min-height:100vh}
  .mono{font-family:"Courier New",monospace}

  /* ---------------- HOME : open book ---------------- */
  #app.home{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:26px;
    background:radial-gradient(1100px 640px at 50% 28%,#3a352c,#17150f 72%)}
  .book{display:grid; grid-template-columns:1fr 1fr; max-width:1020px; width:100%;
    background:#efe6cd; border-radius:6px; box-shadow:0 34px 90px rgba(0,0,0,.65); overflow:hidden;
    border:1px solid #b9ac86}
  @media(max-width:800px){.book{grid-template-columns:1fr}}
  .cover{background:linear-gradient(160deg,#3a8199,#2b6076); color:#fff; padding:30px 26px 60px 40px;
    position:relative; border-right:4px solid var(--ink); min-height:520px}
  .cover .spine{position:absolute; left:8px; top:26px; bottom:26px; writing-mode:vertical-rl; transform:rotate(180deg);
    color:#f2d34a; font-weight:900; letter-spacing:5px; font-size:.82rem; text-shadow:1px 1px 0 var(--ink)}
  .cover .no{position:absolute; right:20px; top:20px; background:#f2d34a; color:var(--ink); font-weight:900;
    border-radius:50%; width:52px; height:52px; display:flex; align-items:center; justify-content:center; font-size:.9rem; border:2px solid var(--ink)}
  .cover h1{font-size:2.7rem; line-height:.92; margin:8px 0 4px; font-weight:900; font-style:italic;
    color:#fff; text-shadow:3px 3px 0 var(--ink), -1px -1px 0 var(--ink)}
  .cover .sub{color:#f2d34a; font-weight:900; font-style:italic; font-size:1.15rem; letter-spacing:1px; text-shadow:2px 2px 0 var(--ink)}
  .cover .feat{margin-top:22px}
  .cover .feat .lab{background:#f2d34a; color:var(--ink); font-weight:900; display:inline-block; padding:2px 12px;
    transform:rotate(-3deg); letter-spacing:2px; font-size:.85rem; border:2px solid var(--ink)}
  .cover .portraits{display:flex; gap:12px; margin-top:14px; flex-wrap:wrap; max-width:420px}
  .cover .portrait{width:62px; height:62px; border-radius:50%; background:#fdf6e3; border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; box-shadow:3px 3px 0 rgba(0,0,0,.35)}
  .cover .portrait svg{width:46px; height:46px}
  .cover .portrait .cap{position:absolute}
  .cover .banner{position:absolute; left:0; right:0; bottom:16px; text-align:center; color:#ffe14d;
    font-weight:900; font-style:italic; font-size:1.3rem; letter-spacing:1px; text-shadow:2px 2px 0 var(--red), 3px 3px 0 var(--ink)}

  .contents{padding:34px 40px; color:#2a2118;
    background:#efe6cd; background-image:radial-gradient(#00000008 1px,transparent 1px); background-size:6px 6px}
  .contents .toc-h{text-align:center; font-size:1.5rem; margin:0 0 6px; color:#2a2118; font-style:italic}
  .contents .toc-note{text-align:center; color:#8a6b4a; font-size:.82rem; margin:0 0 18px}
  .chapter-link{display:block; text-align:center; margin:15px 0; cursor:pointer; text-decoration:none; color:#241c12}
  .chapter-link .t{font-size:1.5rem; font-weight:900; line-height:1.1}
  .chapter-link .t .sk{color:var(--red)}
  .chapter-link .s{color:var(--red); font-style:italic; font-size:1rem}
  .chapter-link:hover .t{color:var(--red)}
  .toc-foot{text-align:center; margin-top:20px; font-style:italic; color:#5a4a34; font-size:1.05rem}
  .toc-foot a{color:#5a4a34; cursor:pointer; text-decoration:none}
  .toc-foot a:hover{color:var(--red)}

  /* ---------------- READER : comic ---------------- */
  #app.reader{min-height:100vh; padding:74px 20px 96px; position:relative;
    background:#111; background-image:radial-gradient(#ffffff08 1px,transparent 1px); background-size:5px 5px}
  .homekey{position:fixed; left:18px; top:12px; cursor:pointer; text-align:center; color:var(--blue); z-index:30}
  .homekey svg{width:32px; height:42px; display:block; margin:0 auto}
  .homekey span{font-weight:900; font-size:.78rem; letter-spacing:2px}
  .stage{max-width:1000px; margin:0 auto}
  .pagetitle{text-align:center; font-size:1.7rem; font-weight:900; letter-spacing:1px; margin:0 0 20px; color:#f6efdb;
    text-shadow:2px 2px 0 #000}
  .panels{display:grid; grid-template-columns:1.05fr .95fr; gap:20px; align-items:start}
  @media(max-width:800px){.panels{grid-template-columns:1fr}}
  .panel2{background:var(--cream); border:3px solid var(--ink); box-shadow:7px 7px 0 rgba(0,0,0,.5); overflow:hidden}
  .panel2 .capbar{background:var(--cap); border-bottom:2px solid var(--ink); padding:8px 12px;
    font-family:"Courier New",monospace; font-size:.86rem; color:#1a1a1a; font-weight:bold}
  .panel2 .art{padding:12px; display:flex; align-items:center; justify-content:center; min-height:250px; background:#0f1622}
  .panel2 .art svg{width:100%; height:auto; max-height:320px}
  .capcol{display:flex; flex-direction:column; gap:2px}
  .narrwrap{max-width:760px; margin:0 auto}
  .caption{background:var(--cream); color:#1a1408; border:3px solid var(--ink); box-shadow:6px 6px 0 rgba(0,0,0,.45);
    padding:12px 16px; margin:0 0 14px; font-weight:bold}
  .narr{font-family:"Courier New",monospace; background:#fdfaf0; color:#20180c; border:2px solid var(--ink);
    padding:11px 14px; margin:12px 0; box-shadow:4px 4px 0 rgba(0,0,0,.35); line-height:1.5}
  .narr b{color:#7a1f14}
  .chcover{display:grid; grid-template-columns:1fr 1fr; gap:22px; align-items:center; background:var(--cream);
    border:3px solid var(--ink); box-shadow:8px 8px 0 rgba(0,0,0,.5); padding:22px}
  @media(max-width:800px){.chcover{grid-template-columns:1fr}}
  .chcover-art{background:#0f1622; border:2px solid var(--ink); padding:10px; display:flex; align-items:center; justify-content:center; min-height:280px}
  .chcover-art svg{width:100%; height:auto; max-height:340px}
  .chcover-txt .issue{font-family:"Courier New",monospace; color:#7a1f14; font-size:.8rem; letter-spacing:2px; font-weight:bold}
  .chcover-txt h1{font-size:2.4rem; line-height:1; margin:6px 0; color:#201810; font-style:italic; font-weight:900}
  .chcover-txt .chsub{color:var(--red); font-style:italic; font-size:1.4rem; font-weight:bold}
  .chcover-txt .chlede{color:#3a2c1c; margin:14px 0; font-size:1.02rem}
  .chcover-txt .starthint{font-family:"Courier New",monospace; color:#7a6a4a; font-size:.86rem}

  /* nav bar */
  .nav{position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:28px;
    padding:16px; background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.75)); z-index:30}
  .navbtn{width:58px; height:58px; border-radius:50%; background:var(--blue); border:3px solid #fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(0,0,0,.6); transition:.15s}
  .navbtn:hover{background:#2b8fbf; transform:translateY(-2px)}
  .navbtn.off{opacity:.28; pointer-events:none}
  .navbtn svg{width:32px; height:24px; fill:#fff}
  .counter{font-family:"Courier New",monospace; color:#f3ecd8; font-size:1rem; letter-spacing:1px; min-width:120px; text-align:center}

  /* ---------- reused components (diagram / quiz / notebook) ---------- */
  figure.diagram{margin:0; width:100%}
  figure.diagram svg{width:100%; height:auto; display:block; max-height:320px}
  figure.diagram figcaption{display:none}
  .dlbl{fill:#eef3fb; font-size:13px; font-weight:600; font-family:"Segoe UI",sans-serif}
  .dsub{fill:#9fb0c6; font-size:10.5px; font-family:"Segoe UI",sans-serif}
  .dlead{stroke:#8aa0bd; stroke-width:1.3; fill:none}

  .quiz{max-width:820px; margin:0 auto; border:3px solid var(--ink); background:var(--panel); box-shadow:8px 8px 0 rgba(0,0,0,.5)}
  .quiz-head{display:flex; align-items:center; gap:12px; padding:16px 20px; background:linear-gradient(90deg,rgba(232,176,75,.14),transparent); border-bottom:2px solid var(--ink)}
  .quiz-head svg{width:26px;height:26px}
  .quiz-head h3{margin:0; font-size:1.2rem; color:#f3ecd8}
  .quiz-head p{margin:0; color:var(--mut); font-size:.82rem}
  .quiz-body{padding:6px 20px 20px}
  .qitem{border-bottom:1px solid var(--line); padding:16px 0}
  .qitem:last-child{border-bottom:none}
  .qitem .qq{font-weight:600; color:#eef3fb; margin:0 0 10px; font-size:1rem; font-family:Georgia,serif}
  .qitem .qq .num{color:var(--gold); margin-right:6px}
  .opts{display:grid; gap:8px}
  .opts button{text-align:left; cursor:pointer; border:1px solid var(--line); background:#0e1420; color:#eef3fb;
    padding:10px 14px; border-radius:8px; font-family:Georgia,serif; font-size:.95rem; transition:.15s; display:flex; gap:9px; align-items:flex-start}
  .opts button:hover:not(:disabled){border-color:var(--gold); background:#121a28}
  .opts button:disabled{cursor:default}
  .opts button .mk{flex:0 0 auto; width:20px; height:20px; border-radius:50%; border:1.5px solid var(--mut);
    display:inline-flex; align-items:center; justify-content:center; font-size:.72rem; color:var(--mut)}
  .opts button.correct{border-color:var(--core); background:rgba(95,191,106,.16)}
  .opts button.correct .mk{border-color:var(--core); background:var(--core); color:#0d1117}
  .opts button.wrong{border-color:var(--sys-circ); background:rgba(232,87,76,.14)}
  .opts button.wrong .mk{border-color:var(--sys-circ); background:var(--sys-circ); color:#0d1117}
  .why{margin:10px 0 0; padding:10px 13px; border-radius:8px; background:var(--bg2); border-left:3px solid var(--gold);
    font-size:.9rem; color:#d6e0ee; display:none}
  .why.show{display:block}
  .why b{color:var(--gold)}
  .scorebar{display:flex; align-items:center; gap:12px; margin-top:16px; padding:12px 16px; background:var(--bg2);
    border:1px solid var(--line); border-radius:8px}
  .scorebar .sc{font-size:1.3rem; color:var(--gold); font-weight:bold}
  .scorebar .msg{color:var(--mut); font-size:.88rem}

  .notebook{max-width:820px; margin:0 auto; border:3px solid var(--ink); background:var(--panel); box-shadow:8px 8px 0 rgba(0,0,0,.5)}
  .nb-head{display:flex; align-items:center; gap:12px; padding:16px 20px; background:linear-gradient(90deg,var(--bg2),transparent); border-bottom:2px solid var(--ink)}
  .nb-head svg{width:26px;height:26px}
  .nb-head h3{margin:0; font-size:1.2rem; color:#f3ecd8}
  .nb-head p{margin:0; color:var(--mut); font-size:.82rem}
  .nb-body{padding:8px 20px 20px}
  .task{border-left:4px solid var(--tc); background:var(--bg2); border-radius:0 10px 10px 0; padding:14px 16px; margin:14px 0}
  .task .lvl{display:inline-flex; align-items:center; gap:7px; font-size:.72rem; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; color:var(--tc); margin-bottom:6px}
  .task .lvl .chip{background:var(--tc); color:#0d1117; padding:2px 9px; border-radius:999px}
  .task.support{--tc:var(--support)} .task.core{--tc:var(--core)} .task.push{--tc:var(--push)}
  .task p{margin:.3em 0 .6em; color:#e7eefb; font-size:.97rem}
  .task textarea{width:100%; min-height:74px; resize:vertical; background:#0e1420; color:#eef3fb;
    border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-family:Georgia,serif; font-size:.95rem; line-height:1.5}
  .task textarea:focus{outline:none; border-color:var(--tc)}
  .writehint{font-size:.74rem; color:var(--mut); margin-top:5px}
  .btnrow{display:flex; flex-wrap:wrap; gap:10px; margin:18px 0 4px}
  .btn{cursor:pointer; border:1px solid var(--line); background:var(--panel); color:#eef3fb; padding:11px 18px;
    border-radius:8px; font-weight:600; font-size:.9rem; font-family:Georgia,serif; display:inline-flex; gap:8px; align-items:center}
  .btn:hover{border-color:var(--gold); color:#fff}
  .btn.primary{background:var(--gold); color:#0d1117; border-color:transparent}
  .save-flag{font-size:.8rem; color:var(--core); opacity:0; transition:.3s}
  .save-flag.on{opacity:1}

  @media print{
    .homekey,.nav,.quiz{display:none!important}
    body,#app.reader{background:#fff!important}
    .notebook,.task,.narr,.caption{border-color:#999!important; background:#fff!important; box-shadow:none!important}
    *{color:#111!important}
    textarea{border:1px solid #999!important}
  }

  /* scootle modal */
  .btn.big{font-size:1.1rem; padding:14px 26px}
  .attrib{font-size:.76rem; color:#8a6a4a; margin-top:16px; text-align:center; font-style:italic}
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.86); z-index:100; display:none; align-items:center; justify-content:center; padding:18px}
  .modal.show{display:flex}
  .modal-box{width:min(1120px,96vw); height:min(780px,92vh); background:#111; border:3px solid var(--ink); border-radius:6px; display:flex; flex-direction:column; box-shadow:0 24px 70px #000; overflow:hidden}
  .modal-bar{display:flex; align-items:center; gap:14px; padding:10px 14px; background:#1a2230; border-bottom:2px solid #000; color:#f3ecd8; font-family:"Courier New",monospace; font-size:.84rem}
  .modal-bar span{flex:1; font-weight:bold}
  .modal-open{color:#3fa7d6; text-decoration:none; font-weight:bold; white-space:nowrap}
  .modal-x{cursor:pointer; background:var(--red); color:#fff; border:none; padding:7px 12px; border-radius:6px; font-weight:bold; font-family:inherit}
  .modal-box iframe{flex:1; width:100%; border:0; background:#fff}
  .modal-foot{padding:6px 12px; background:#1a2230; color:#9fb0c6; font-size:.72rem; text-align:center}


  /* interactive case-study hooks */
  .predict{background:#fff4d6; border:3px solid var(--ink); box-shadow:5px 5px 0 rgba(0,0,0,.4); padding:12px 14px; margin:0 0 12px; color:#3a2c12; font-family:"Courier New",monospace}
  .predict b{color:#a5241f}
  .predict textarea{width:100%; min-height:62px; margin-top:8px; background:#fffdf6; border:2px solid var(--ink); border-radius:4px; padding:9px; font-family:Georgia,serif; color:#20180c; resize:vertical}
  .rc-hint{font-family:"Courier New",monospace; color:#cdc6b0; font-size:.82rem; margin:2px 0 10px}
  .reveal-card{background:var(--cream); border:3px solid var(--ink); box-shadow:5px 5px 0 rgba(0,0,0,.4); padding:12px 14px; margin:12px 0}
  .rc-q{font-weight:bold; color:#20180c; margin-bottom:9px}
  .rc-tip{color:#8a7a56; font-weight:normal; font-style:italic}
  .reveal-btn{background:var(--blue); color:#fff; border:none; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer; font-family:"Courier New",monospace}
  .reveal-btn:hover{background:#2b8fbf}
  .rc-a{display:none; margin-top:11px; padding:11px 13px; background:#eaf5e6; border-left:4px solid var(--core); color:#20180c; font-family:"Courier New",monospace; font-size:.92rem; line-height:1.5}
  .rc-a.show{display:block}
  .rc-a b{color:#7a1f14}
  .caption.bigq-case{background:#ffe1d8; color:#7a1f14; font-style:italic}


  /* olympians */
  .oly-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
  @media(max-width:800px){.oly-grid{grid-template-columns:1fr}}
  .oly-card{background:var(--cream); border:3px solid var(--ink); box-shadow:6px 6px 0 rgba(0,0,0,.45); padding:14px}
  .oly-illus{border:2px solid var(--ink); background:#0f1622; margin-bottom:10px; line-height:0}
  .oly-illus svg{display:block; width:100%; height:auto}
  .oly-name{margin:.2em 0; color:#20180c; font-size:1.3rem}
  .oly-event{color:#a5241f; font-style:italic; font-size:.9rem; margin-bottom:8px}
  .oly-card .predict{font-size:.9rem; margin-bottom:10px}
  .rc-a ul{margin:.2em 0 .2em 1.1em; padding-left:4px}
  .rc-a li{margin:.28em 0}
  .chartfig{margin:16px 0}
  .chart-wrap{background:#fbf7ea; border:3px solid var(--ink); box-shadow:6px 6px 0 rgba(0,0,0,.45); padding:8px}
  .chart-wrap svg{display:block; width:100%; height:auto}
  .srclink{color:#274b9e; word-break:break-all}


  /* olympian photos */
  .oly-illus img{display:block; width:100%; height:auto; background:#0f1622}
  .athfallback svg{display:block; width:100%; height:auto}
  .oly-stats{font-family:"Courier New",monospace; font-size:.82rem; color:#3a2c1c; background:#f0e6cf; border:1px solid #b7a983; padding:6px 9px; margin-bottom:9px}


  .chartimg{display:block; width:100%; height:auto; border:2px solid var(--ink)}

</style>
</head>
<body>
<div id="app"></div>
<script>

/* ===================== ICONS & ART ===================== */
const ICONS = {
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="#e8b04b" stroke-width="1.6"><path d="M4 5a2 2 0 012-2h6v16H6a2 2 0 00-2 2V5z"/><path d="M20 5a2 2 0 00-2-2h-6v16h6a2 2 0 012 2V5z"/></svg>',
  struct:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#8fe0ec" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>',
  func:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#8fe0a0" stroke-width="1.6"><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/><circle cx="12" cy="12" r="4"/></svg>',
  homeo:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#f0cd86" stroke-width="1.6"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>',
  imb:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#f0968f" stroke-width="1.6"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg>'
};
const QICON='<svg viewBox="0 0 24 24" fill="none" stroke="#e8b04b" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M9.2 9.2a2.8 2.8 0 015.3 1c0 1.9-2.5 2.2-2.5 3.8"/><circle cx="12" cy="17.2" r=".9" fill="#e8b04b" stroke="none"/></svg>';

const ART = {
  home:`<svg viewBox="0 0 240 240"><circle cx="120" cy="120" r="96" fill="#131a24" stroke="#26344a"/><path d="M120 60c-16 22-30 30-30 52a30 30 0 0060 0c0-22-14-30-30-52z" fill="#e8574c" fill-opacity=".85"/><path d="M120 150c-6 8-14 12-14 22a14 14 0 0028 0c0-10-8-14-14-22z" fill="none" stroke="#5ec8d8" stroke-width="2"/><text x="120" y="205" text-anchor="middle" fill="#9fb0c6" font-size="11" font-family="Georgia">structure &#8594; function</text></svg>`,
  homeo:`<svg viewBox="0 0 220 220"><circle cx="110" cy="110" r="70" fill="none" stroke="#e8b04b" stroke-width="3" stroke-dasharray="6 8"/><path d="M110 40v18M110 162v18M40 110h18M162 110h18" stroke="#e8b04b" stroke-width="3"/><circle cx="110" cy="110" r="30" fill="#e8b04b" fill-opacity=".2" stroke="#e8b04b" stroke-width="2"/><text x="110" y="115" text-anchor="middle" fill="#e8b04b" font-size="15" font-family="Georgia">37&#176;C</text></svg>`,
  fire:`<svg viewBox="0 0 220 220"><path d="M110 40c-18 28-40 40-40 74a40 40 0 0080 0c0-34-22-46-40-74z" fill="#ff6b35"/><path d="M110 90c-8 14-18 20-18 36a18 18 0 0036 0c0-16-10-22-18-36z" fill="#ffd23f"/></svg>`
};

const HEART_ANIM=`<svg viewBox="0 0 240 272" xmlns="http://www.w3.org/2000/svg">
<style>
.hb{transform-box:fill-box;transform-origin:center;animation:hbeat 1.05s ease-in-out infinite}
@keyframes hbeat{0%,55%,100%{transform:scale(1)}12%{transform:scale(1.09)}30%{transform:scale(1.035)}}
.din{animation:din 1.9s ease-in infinite}
.dout{animation:dout 1.9s ease-out infinite}
@keyframes din{0%{opacity:0;transform:translateY(-44px)}25%{opacity:.9}55%{opacity:.9;transform:translateY(0)}72%,100%{opacity:0}}
@keyframes dout{0%,30%{opacity:0;transform:translateY(0)}46%{opacity:.9}80%{opacity:.9;transform:translateY(-44px)}100%{opacity:0}}
</style>
<g class="hb">
<path d="M112 72 C112 36 158 34 158 76 L158 120" fill="none" stroke="#e85c7a" stroke-width="17" stroke-linecap="round"/>

function quiz(id){
  const qs=QUIZ[id]; if(!qs) return '';
  const items=qs.map((q,i)=>{
    const opts=q.o.map((opt,j)=>`<button onclick="answer(this,'${id}',${i},${j},${q.a})"><span class="mk">${'ABCD'[j]}</span><span>${opt}</span></button>`).join('');
    return `<div class="qitem"><p class="qq"><span class="num">Q${i+1}.</span>${q.q}</p><div class="opts">${opts}</div><div class="why" id="why-${id}-${i}"><b>Why:</b> ${q.w}</div></div>`;
  }).join('');
  return `<div class="quiz"><div class="quiz-head">${QICON}<div><h3>Detective Quiz — check your understanding</h3><p>Click an answer for instant feedback. Try them all!</p></div></div>
    <div class="quiz-body">${items}<div class="scorebar"><span class="sc" id="sc-${id}">0 / ${qs.length}</span><span class="msg" id="msg-${id}">Answer the questions to build your score.</span></div></div></div>`;
}
const qState={};
function answer(btn,id,qi,choice,correct){
  const key=id+'-'+qi; if(qState[key]!==undefined) return; qState[key]=choice;
  const item=btn.closest('.qitem');
  item.querySelectorAll('.opts button').forEach((b,j)=>{ b.disabled=true; if(j===correct) b.classList.add('correct'); });
  if(choice!==correct) btn.classList.add('wrong');
  document.getElementById('why-'+key).classList.add('show');
  const qs=QUIZ[id]; let score=0, answered=0;
  qs.forEach((q,i)=>{ const k=id+'-'+i; if(qState[k]!==undefined){ answered++; if(qState[k]===q.a) score++; } });
  document.getElementById('sc-'+id).textContent=score+' / '+qs.length;
  const msg=document.getElementById('msg-'+id);
  if(answered<qs.length) msg.textContent='Keep going — '+answered+' of '+qs.length+' answered.';
  else msg.textContent = score===qs.length ? 'Perfect! You have mastered this chapter.'
    : score>=Math.ceil(qs.length/2) ? 'Great effort — look back at the ones you missed.'
    : 'Good try — read the chapter again, then have another go.';
}
function notebook(s){
  const nb=s.nb;
  return `<div class="notebook">
    <div class="nb-head">${ICONS.book}<div><h3>Notebook — ${s.name}</h3><p>Choose your level. Type here (it saves) and write in your exercise book too.</p></div></div>
    <div class="nb-body">
      ${taskBlock(s.id,'support','Support-ready',nb.support)}
      ${taskBlock(s.id,'core','Core-steady',nb.core)}
      ${taskBlock(s.id,'push','Push-Go',nb.push)}
      <div class="btnrow">
        <button class="btn primary" onclick="printNotebook()">Print my notebook</button>
        <button class="btn" onclick="clearOne('${s.id}')">Clear this page</button>
        <span class="save-flag" id="flag-${s.id}">saved</span>
      </div>
    </div></div>`;
}
function taskBlock(sid,lvl,label,text){
  const key='nb_'+sid+'_'+lvl;
  return `<div class="task ${lvl}"><span class="lvl"><span class="chip">${label}</span></span>
    <p>${text}</p>
    <textarea data-key="${key}" data-sys="${sid}" placeholder="Type your ${label.toLowerCase()} answer here..."></textarea>
    <div class="writehint">Also write / draw this in your exercise book.</div></div>`;
}

function wrapLabel(l){ const w=l.split(' '); if(w.length<2||l.length<=13) return [l]; const mid=Math.ceil(w.length/2); return [w.slice(0,mid).join(' '), w.slice(mid).join(' ')]; }
function barChart(g){
  const W=540,H=290,left=64,right=24,base=214,top=46,bars=g.bars,n=bars.length;
  const plotW=W-left-right, slot=plotW/n, bw=Math.min(80,slot*0.62), maxh=base-top, suf=g.suffix||'';
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><rect width="${W}" height="${H}" fill="#fbf7ea"/>`;
  s+=`<text x="${W/2}" y="26" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="16" fill="#20180c">${g.title}</text>`;
  if(g.tag) s+=`<text x="${W-right}" y="16" text-anchor="end" font-family="Segoe UI,sans-serif" font-size="10.5" fill="#a5241f">${g.tag}</text>`;
  s+=`<line x1="${left}" y1="${base}" x2="${W-right}" y2="${base}" stroke="#20180c" stroke-width="2"/>`;
  bars.forEach((b,i)=>{ const h=Math.round(maxh*b.v/g.max), x=left+slot*i+(slot-bw)/2;
    s+=`<rect x="${x}" y="${base-h}" width="${bw}" height="${h}" fill="${b.c}" stroke="#20180c" stroke-width="2"/>`;
    s+=`<text x="${x+bw/2}" y="${base-h-8}" text-anchor="middle" font-family="Segoe UI,sans-serif" font-weight="bold" font-size="15" fill="#20180c">${b.v}${suf}</text>`;
    wrapLabel(b.l).forEach((ln,j)=>{ s+=`<text x="${x+bw/2}" y="${base+16+j*14}" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="11.5" font-weight="bold" fill="#3a2c1c">${ln}</text>`; });
  });
  s+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#6a5a3c">${g.unit}</text></svg>`;
  return s;
}

  if(!any) html+='<p class="empty">You have not typed any answers yet. Open a chapter, reach the Notebook page and type first!</p>';
  html+='</body></html>';
  const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>w.print(),300);
}
